<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページが見つかりません | Web制作パートナー</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .error-container {
            text-align: center;
            padding: 150px 20px;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-code { font-size: 6rem; font-weight: 700; color: #cbd5e1; line-height: 1; }
        .error-container h1 { font-size: 1.8rem; margin: 20px 0; }
        .error-container p { color: #64748b; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>お探しのページが見つかりません</h1>
        <p>アクセスしようとしたページは削除されたか、URLが変更された可能性があります。</p>
        <a href="index.html" class="btn btn-primary" style="background-color: #0f172a; color: #ffffff;">トップページへ戻る</a>
    </div>
</body>
</html>
